version: "2"

run:
  timeout: 5m

linters:
  enable:
    - govet
    - ineffassign
    - misspell
    - goconst
    - gocyclo
    - staticcheck

formatters:
  enable:
    - gofmt
    - goimports

linters-settings:
  gocyclo:
    min-complexity: 15
  goconst:
    min-len: 3
    min-occurrences: 3
  govet:
    enable-all: true
  misspell:
    locale: US

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
